name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -race -count=1
      - name: Validate every example scenario
        run: |
          go build -o /tmp/edt ./cmd/edt
          set -e
          # Non-scenario YAML (docker-compose, helm values) is named differently;
          # examples/*.yaml and examples/demo/scenario.yaml are the scenario set.
          for f in examples/*.yaml examples/demo/scenario.yaml; do
            echo "--- $f"
            /tmp/edt validate --file "$f"
          done

  sdk-ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk/ts/package-lock.json
      - name: Build edt binary (for round-trip tests)
        working-directory: .
        run: go build -o /tmp/edt ./cmd/edt
      - name: Install
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        env:
          EDT_BIN: /tmp/edt
        run: npm test

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Helm lint
        run: helm lint charts/edt
      - name: Helm template renders
        run: |
          # Production shape: requireAuth=true with both tokens set.
          helm template ci charts/edt \
            --set controlPlane.adminToken=admin-secret \
            --set controlPlane.workerToken=worker-secret > /tmp/default.yaml
          # Full render: + Postgres + ServiceMonitor.
          helm template ci charts/edt \
            --set controlPlane.adminToken=admin-secret \
            --set controlPlane.workerToken=worker-secret \
            --set controlPlane.dbURL=postgres://x \
            --set serviceMonitor.enabled=true > /tmp/full.yaml
          test -s /tmp/default.yaml && test -s /tmp/full.yaml
          grep -q 'kind: Deployment' /tmp/default.yaml
          grep -q 'kind: ServiceMonitor' /tmp/full.yaml
          # Auth-off render (dev mode) must succeed without tokens.
          helm template ci charts/edt --set controlPlane.requireAuth=false > /dev/null
          # Half-enabled auth must REFUSE to render (codex P1 2026-04-24:
          # requireAuth=true + empty workerToken silently shipped workers
          # unable to register).
          if helm template ci charts/edt --set controlPlane.adminToken=secret 2>/dev/null; then
            echo "expected helm template to fail when requireAuth=true + workerToken is empty"
            exit 1
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate chart-rendered flags against edt binary
        # Extract the worker args the chart renders and pass them all to
        # `edt worker --help` style parsing. Catches chart-to-CLI drift
        # (codex P0 2026-04-24: --eval-interval did not exist on the worker).
        run: |
          go build -o /tmp/edt ./cmd/edt
          python3 <<'PY'
          import re, subprocess, sys, yaml
          with open('/tmp/default.yaml') as f:
              docs = list(yaml.safe_load_all(f))
          workers = [d for d in docs if d and d.get('kind') == 'Deployment'
                     and d['metadata']['labels'].get('app.kubernetes.io/component') == 'worker']
          assert len(workers) == 1, f"expected 1 worker Deployment, got {len(workers)}"
          args = workers[0]['spec']['template']['spec']['containers'][0]['args']
          # Strip values, keep only flag names.
          flags = [a.split('=')[0] for a in args if a.startswith('--')]
          help_out = subprocess.check_output(['/tmp/edt', 'worker', '--help'], text=True)
          for flag in flags:
              if flag not in help_out:
                  print(f"CHART-CLI DRIFT: worker Deployment renders {flag} but edt worker does not accept it")
                  print(help_out)
                  sys.exit(1)
          print(f"verified {len(flags)} worker flags against the binary")
          PY
