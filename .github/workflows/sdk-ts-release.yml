name: sdk-ts-release
on:
  push:
    tags:
      - 'sdk-ts/v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: sdk/ts/package-lock.json
      - name: Extract tag version
        id: ver
        run: |
          # tag format: sdk-ts/v0.1.0 → 0.1.0
          tag_name="${GITHUB_REF#refs/tags/}"
          version="${tag_name#sdk-ts/v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Assert package.json version matches tag
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "${{ steps.ver.outputs.version }}" ]; then
            echo "tag ${{ steps.ver.outputs.version }} does not match package.json $pkg_version" >&2
            exit 1
          fi
      - name: Build edt for round-trip tests
        working-directory: .
        run: go build -o /tmp/edt ./cmd/edt
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        env:
          EDT_BIN: /tmp/edt
        run: npm test
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
