apiVersion: edt.io/v1
kind: Scenario
metadata:
  name: order-flow-e2e
  labels:
    team: commerce
    env: local
spec:
  connectors:
    kafka:
      bootstrap_servers: localhost:9092
  data:
    orders:
      generator:
        strategy: faker
        seed: 42
        overrides:
          orderId: ${uuid()}
          customerId: ${faker.person.id()}
          amount: ${faker.number.float(10, 500)}
  steps:
    - name: place-orders
      produce:
        topic: orders
        payload: ${data.orders}
        count: 20
        rate: 20/s
  checks:
    - name: at_least_ten_produced
      expr: size(stream('orders')) >= 10
      severity: critical
    - name: all_orders_have_key
      expr: stream('orders').all(e, e.key != '')
      severity: warning
