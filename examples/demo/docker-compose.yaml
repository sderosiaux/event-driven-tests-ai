# Full "works out of the box" demo stack.
#
#   docker compose -f examples/demo/docker-compose.yaml up --build
#
# Brings up:
#   - redpanda            Kafka broker (port 19092 on host)
#   - httpbin             real HTTP service (port 18082 on host)
#   - edt-cp              control plane + UI on http://localhost:18080
#                         auto-seeded with 8 domain-oriented showcase scenarios
#   - edt-seed-runs       one-shot: runs every showcase scenario once so the
#                         /ui/runs table is populated with real data
#   - edt-worker          long-running watch-mode worker, registers with CP
#                         and is available for scenario assignments
#
# Open http://localhost:18080/ui/builder to build a new scenario visually.
# Open http://localhost:18080/ui/runs to see all runs populated by the seeder.
# Tear down with: docker compose down -v

x-edt-build: &edt-build
  build:
    context: ../..

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --check=false
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    ports:
      - "${EDT_KAFKA_PORT:-19092}:9092"

  httpbin:
    image: kennethreitz/httpbin
    ports:
      - "${EDT_HTTPBIN_PORT:-18082}:80"
    restart: unless-stopped

  edt-cp:
    <<: *edt-build
    command:
      - serve
      - --addr=:8080
      - --seed-dir=/etc/edt/showcase
    environment:
      # Env substitution into seeded YAMLs so they point at the compose
      # network hostnames rather than localhost.
      KAFKA_BROKERS: redpanda:9092
      HTTPBIN_URL: http://httpbin
    ports:
      - "${EDT_CP_PORT:-18080}:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ../showcase:/etc/edt/showcase:ro

  # One-shot: run each showcase scenario against the real stack so the
  # /ui/runs table has real data the moment the user opens the UI.
  edt-seed-runs:
    <<: *edt-build
    command:
      - batch-run
      - --dir=/etc/edt/showcase
      - --report-to=http://edt-cp:8080
    environment:
      KAFKA_BROKERS: redpanda:9092
      HTTPBIN_URL: http://httpbin
    depends_on:
      edt-cp:
        condition: service_started
      redpanda:
        condition: service_healthy
      httpbin:
        condition: service_started
    volumes:
      - ../showcase:/etc/edt/showcase:ro
    restart: "no"

  edt-worker:
    <<: *edt-build
    command:
      - worker
      - --control-plane=http://edt-cp:8080
      - --labels=env=demo,pool=showcase
    depends_on:
      edt-cp:
        condition: service_started
    restart: unless-stopped
