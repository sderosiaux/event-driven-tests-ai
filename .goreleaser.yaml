version: 2

project_name: event-driven-tests-ai

before:
  hooks:
    - go mod tidy

builds:
  - id: edt
    main: ./cmd/edt
    binary: edt
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: edt-archive
    name_template: >-
      edt_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - examples/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ .Version }}-snapshot'

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'

dockers:
  - id: edt-amd64
    use: buildx
    goos: linux
    goarch: amd64
    image_templates:
      - 'ghcr.io/sderosiaux/event-driven-tests-ai:{{ .Version }}-amd64'
      - 'ghcr.io/sderosiaux/event-driven-tests-ai:latest-amd64'
    dockerfile: Dockerfile
    build_flag_templates:
      - --platform=linux/amd64
      - --build-arg=VERSION={{ .Version }}
  - id: edt-arm64
    use: buildx
    goos: linux
    goarch: arm64
    image_templates:
      - 'ghcr.io/sderosiaux/event-driven-tests-ai:{{ .Version }}-arm64'
      - 'ghcr.io/sderosiaux/event-driven-tests-ai:latest-arm64'
    dockerfile: Dockerfile
    build_flag_templates:
      - --platform=linux/arm64
      - --build-arg=VERSION={{ .Version }}

docker_manifests:
  - name_template: 'ghcr.io/sderosiaux/event-driven-tests-ai:{{ .Version }}'
    image_templates:
      - 'ghcr.io/sderosiaux/event-driven-tests-ai:{{ .Version }}-amd64'
      - 'ghcr.io/sderosiaux/event-driven-tests-ai:{{ .Version }}-arm64'
  - name_template: 'ghcr.io/sderosiaux/event-driven-tests-ai:latest'
    image_templates:
      - 'ghcr.io/sderosiaux/event-driven-tests-ai:latest-amd64'
      - 'ghcr.io/sderosiaux/event-driven-tests-ai:latest-arm64'

release:
  prerelease: auto
  draft: false
