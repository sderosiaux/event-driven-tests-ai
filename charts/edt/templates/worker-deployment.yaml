{{- if .Values.worker.enabled -}}
{{/*
Codex P1 2026-04-24: an install with requireAuth=true + adminToken set +
workerToken empty silently ships workers that cannot authenticate. Fail
template rendering instead of letting operators discover it at runtime.
*/}}
{{- if and .Values.controlPlane.requireAuth (not .Values.controlPlane.workerToken) .Values.worker.enabled -}}
{{- fail "charts/edt: controlPlane.requireAuth=true but controlPlane.workerToken is empty. Workers cannot register without a token. Set controlPlane.workerToken (e.g. openssl rand -hex 32) or disable auth with controlPlane.requireAuth=false." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edt.fullname" . }}-worker
  labels:
    {{- include "edt.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "edt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "edt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "edt.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: edt
          image: {{ include "edt.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - worker
            - --control-plane={{ include "edt.controlPlaneURL" . }}
            {{- if .Values.controlPlane.workerToken }}
            - --token=$(EDT_TOKEN)
            {{- end }}
            {{- range $k, $v := .Values.worker.labels }}
            - --labels={{ $k }}={{ $v }}
            {{- end }}
            {{- if .Values.worker.heartbeatInterval }}
            - --heartbeat-interval={{ .Values.worker.heartbeatInterval }}
            {{- end }}
            {{- if .Values.worker.loopInterval }}
            - --loop-interval={{ .Values.worker.loopInterval }}
            {{- end }}
            {{- if .Values.worker.reportInterval }}
            - --report-interval={{ .Values.worker.reportInterval }}
            {{- end }}
          env:
            {{- if .Values.controlPlane.workerToken }}
            - name: EDT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "edt.workerSecretName" . }}
                  key: worker-token
            {{- end }}
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
